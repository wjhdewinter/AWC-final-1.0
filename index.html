<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AWC Warehouse Tool V11</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {margin:0;font-family:Arial;background:#f4f4f4;}
header {background:#000;color:#fff;padding:20px;text-align:center;font-size:20px;}
.lang {display:flex;justify-content:center;gap:10px;padding:10px;background:#222;}
.lang button {padding:12px 20px;font-size:16px;border:none;background:#ff7a00;color:#fff;border-radius:10px;}
nav {display:grid;grid-template-columns:repeat(3,1fr);}
nav button {padding:20px;font-size:18px;border:none;background:#111;color:#fff;}
nav button.active {background:#ff7a00;}
main {padding:15px;}
.card {background:#fff;padding:20px;border-radius:15px;margin-bottom:15px;}
input,select,textarea {width:100%;padding:16px;margin-top:8px;border-radius:12px;border:1px solid #ccc;font-size:16px;}
button.action {width:100%;padding:18px;margin-top:10px;border:none;border-radius:12px;font-size:18px;background:#000;color:#fff;}
button.orange {background:#ff7a00;}
.preview {display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
.preview img {width:90px;height:90px;object-fit:cover;border-radius:10px;border:2px solid orange;}
.error {background:#ffe5e5;color:#b00000;padding:10px;display:none;}
.tab {display:none;}
</style>
</head>

<body>

<header>AWC Warehouse Tool V11</header>

<div class="lang">
<button onclick="setLang('nl')">NL</button>
<button onclick="setLang('en')">EN</button>
</div>

<nav>
<button onclick="tab('p')" class="active">Pallets</button>
<button onclick="tab('m')">Machines</button>
<button onclick="tab('i')">Incident</button>
</nav>

<main>

<!-- PALLETS -->
<div id="p" class="card tab" style="display:block;">
<h3>Pallettelling</h3>

<input id="naam" placeholder="Naam">
<select id="loc">
<option>Conakryweg</option>
<option>Slego</option>
</select>

<input type="number" id="eu" placeholder="Europallets" value="0">
<input type="number" id="blok" placeholder="Blokpallets" value="0">
<input type="number" id="m2" placeholder="2 meter pallets" value="0">
<input type="number" id="dpb" placeholder="DPB pallets" value="0">

<input type="file" multiple accept="image/*" capture="environment" onchange="previewMulti(event,'pPrev')">
<div id="pPrev" class="preview"></div>

<button class="action orange" onclick="mailP()">Mail</button>
<button class="action" onclick="excelP()">Excel</button>
<button class="action" onclick="pdfP()">PDF</button>
</div>

<!-- MACHINES -->
<div id="m" class="card tab">
<h3>Machine check</h3>

<input id="user" placeholder="Gebruiker">
<input id="ser" placeholder="Serienummer">
<input id="nr" placeholder="Machinenummer">

<select id="c1"><option>Goed</option><option>Fout</option></select>
<select id="c2"><option>Goed</option><option>Fout</option></select>
<select id="c3"><option>Goed</option><option>Fout</option></select>
<select id="c4"><option>Goed</option><option>Fout</option></select>

<textarea id="note" placeholder="Beschrijving"></textarea>

<input type="file" multiple accept="image/*" capture="environment" onchange="previewMulti(event,'mPrev')">
<div id="mPrev" class="preview"></div>

<button class="action orange" onclick="mailM()">Mail</button>
<button class="action" onclick="excelM()">Excel</button>
<button class="action" onclick="pdfM()">PDF</button>
</div>

<!-- INCIDENT -->
<div id="i" class="card tab">
<h3>Incident</h3>

<input id="naamI" placeholder="Naam">
<input id="locI" placeholder="Locatie">
<input type="datetime-local" id="tijd">

<textarea id="wat" placeholder="Wat gebeurde er"></textarea>
<textarea id="oorzaak" placeholder="Oorzaak"></textarea>
<textarea id="actie" placeholder="Actie"></textarea>

<input type="file" multiple accept="image/*" capture="environment" onchange="previewMulti(event,'iPrev')">
<div id="iPrev" class="preview"></div>

<button class="action orange" onclick="mailI()">Mail</button>
<button class="action" onclick="excelI()">Excel</button>
<button class="action" onclick="pdfI()">PDF</button>
</div>

</main>

<script>

function tab(t){
document.querySelectorAll(".tab").forEach(e=>e.style.display="none");
document.getElementById(t).style.display="block";
}

function previewMulti(event,id){
const c=document.getElementById(id);
c.innerHTML="";
Array.from(event.target.files).forEach(f=>{
const r=new FileReader();
r.onload=e=>{
const img=document.createElement("img");
img.src=e.target.result;
c.appendChild(img);
};
r.readAsDataURL(f);
});
}

function mailP(){location.href="mailto:?subject=Pallets";}
function excelP(){alert("Excel export");}

async function pdfP(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
doc.text("Pallettelling",10,10);
await addImages(doc,'pPrev');
doc.save("pallets.pdf");
}

function mailM(){location.href="mailto:?subject=Machine";}
function excelM(){alert("Excel export");}

async function pdfM(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
doc.text("Machine check",10,10);
await addImages(doc,'mPrev');
doc.save("machine.pdf");
}

function mailI(){location.href="mailto:?subject=Incident";}
function excelI(){alert("Excel export");}

async function pdfI(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
doc.text("Incident",10,10);
await addImages(doc,'iPrev');
doc.save("incident.pdf");
}

async function addImages(doc,id){
const imgs=document.getElementById(id).querySelectorAll("img");
let y=20;
for(let img of imgs){
if(y>250){doc.addPage();y=20;}
doc.addImage(img.src,'JPEG',10,y,100,70);
y+=80;
}
}

function setLang(l){alert("Taal switch actief in volgende versie");}

</script>

</body>
</html>
