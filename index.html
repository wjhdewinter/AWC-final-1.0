<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWC V20 Enterprise (Full Merge)</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a00">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --black:#111; --orange:#ff7a00; --white:#fff; --bg:#f4f4f4; --border:#ddd; --muted:#666;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:var(--bg);color:#111}
.topbar{background:var(--black);color:#fff;padding:14px 16px;font-weight:700}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:#1a1a1a;color:#fff;padding:12px}
.sidebar button{display:block;width:100%;margin:6px 0;padding:12px;border:0;border-radius:10px;background:#2a2a2a;color:#fff;text-align:left}
.sidebar button.active{background:var(--orange)}
.main{flex:1;padding:12px}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border)}
textarea{min-height:80px}
.button-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
button.action{padding:10px 14px;border-radius:10px;border:0;background:#222;color:#fff}
button.primary{background:var(--orange)}
button.danger{background:#c0392b}
.preview img{width:80px;height:80px;object-fit:cover;border-radius:8px;margin:4px;border:1px solid #eee}
.row{border:1px solid var(--border);border-radius:12px;padding:10px;margin-top:10px}
.row-head{display:flex;justify-content:space-between;align-items:center}
.small{font-size:12px;color:var(--muted)}
.badge{padding:4px 8px;border-radius:999px;border:1px solid #ddd;margin-right:6px;cursor:pointer}
.badge.active{outline:2px solid #111}
.badge.valid{background:#d4f5d4}
.badge.invalid{background:#ffd6d6}
.badge.na{background:#eee}
.hidden{display:none}
.history-item{border-bottom:1px solid #eee;padding:8px 0}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>

<div class="topbar">AWC V20 ENTERPRISE — FULL MERGE (Manco = Schade stijl)</div>

<div class="layout">
  <div class="sidebar">
    <button id="btnDash" class="active" onclick="openTab('dashboard', this)">📊 Dashboard</button>
    <button id="btnDamage" onclick="openTab('damage', this)">💥 Schade</button>
    <button id="btnManco" onclick="openTab('manco', this)">📉 Manco</button>
  </div>

  <div class="main">

    <!-- DASHBOARD -->
    <section id="dashboard" class="tab">
      <div class="card">
        <h2>Dashboard</h2>
        <div class="grid-3">
          <div class="card">
            <div class="small">Schade items</div>
            <div id="dashDamage">0</div>
          </div>
          <div class="card">
            <div class="small">Manco items</div>
            <div id="dashManco">0</div>
          </div>
          <div class="card">
            <div class="small">Totaal records</div>
            <div id="dashTotal">0</div>
          </div>
        </div>
      </div>
    </section>

    <!-- SCHADE (basis aanwezig, zelfde stijl als manco maar zonder extra velden) -->
    <section id="damage" class="tab hidden">
      <div class="card">
        <h2>Schade registratie</h2>

        <div class="grid-3">
          <div>
            <label>E-mail</label>
            <input id="damageEmail" value="willem@amsterdamwarehouse.com">
          </div>
          <div>
            <label>Locatie</label>
            <input id="damageLocation" placeholder="Vul locatie in">
          </div>
          <div>
            <label>Gebruiker</label>
            <input id="damageUser" placeholder="Naam">
          </div>
        </div>

        <div class="top-actions">
          <button class="action primary" onclick="addDamageRow()">+ Regel</button>
          <button class="action" onclick="exportDamage('pdf')">PDF</button>
          <button class="action" onclick="exportDamage('excel')">Excel</button>
          <button class="action" onclick="exportDamage('mail')">Mail</button>
          <button class="action" onclick="exportDamage('wa')">WhatsApp</button>
          <button class="action" onclick="saveDamageHistory()">Opslaan</button>
          <button class="action danger" onclick="clearHistory('damage')">Historie wissen</button>
        </div>

        <div id="damageList"></div>
      </div>

      <div class="card">
        <h3>Historie schade</h3>
        <div id="damageHistory"></div>
      </div>
    </section>

    <!-- MANCO (SCHADE STIJL + EXTRA VELDEN) -->
    <section id="manco" class="tab hidden">
      <div class="card">
        <h2>Manco registratie (schade stijl)</h2>

        <div class="grid-3">
          <div>
            <label>E-mail</label>
            <input id="mancoEmail" value="willem@amsterdamwarehouse.com">
          </div>
          <div>
            <label>Locatie (verplicht)</label>
            <input id="mancoLocation" placeholder="Vul locatie in">
          </div>
          <div>
            <label>Gebruiker</label>
            <input id="mancoUser" placeholder="Naam">
          </div>
        </div>

        <div class="top-actions">
          <button class="action primary" onclick="addMancoRow()">+ Regel</button>
          <button class="action" onclick="exportManco('pdf')">PDF</button>
          <button class="action" onclick="exportManco('excel')">Excel</button>
          <button class="action" onclick="exportManco('mail')">Mail</button>
          <button class="action" onclick="exportManco('wa')">WhatsApp</button>
          <button class="action" onclick="saveMancoHistory()">Opslaan</button>
          <button class="action danger" onclick="clearHistory('manco')">Historie wissen</button>
        </div>

        <div id="mancoList"></div>
      </div>

      <div class="card">
        <h3>Historie manco</h3>
        <div id="mancoHistory"></div>
      </div>
    </section>

  </div>
</div>

<script>
// ====== STORAGE ======
const STORAGE_KEYS = {
  damage: 'awc_v20_damage_history',
  manco: 'awc_v20_manco_history'
};

// ====== NAV ======
function openTab(id, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

// ====== UTIL ======
function fileToDataUrl(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}
function getHistory(key){ return JSON.parse(localStorage.getItem(key)||'[]'); }
function setHistory(key, data){ localStorage.setItem(key, JSON.stringify(data)); updateDashboard(); }

// ====== COMMON ROW BUILDER ======
function buildPhotoBlock(prefix){
  return `
    <div>
      <label>Foto</label>
      <input type="file" class="${prefix}-photo" accept="image/*" multiple>
      <div class="preview ${prefix}-preview"></div>
    </div>
  `;
}
function bindPhotoInput(row, prefix, rowData){
  const input = row.querySelector(`.${prefix}-photo`);
  const preview = row.querySelector(`.${prefix}-preview`);
  input.addEventListener('change', async ()=>{
    preview.innerHTML='';
    rowData.photos = [];
    for(const f of input.files){
      const url = await fileToDataUrl(f);
      rowData.photos.push(url);
      const img = document.createElement('img');
      img.src = url;
      preview.appendChild(img);
    }
  });
}

// ====== SCHADE ======
function createDamageRowData(){
  return { article:'', remarks:'', photos:[] };
}
function addDamageRow(prefill){
  const data = prefill || createDamageRowData();
  const wrap = document.getElementById('damageList');
  const row = document.createElement('div');
  row.className='row';
  row.innerHTML = `
    <div class="row-head">
      <strong>Schade regel</strong>
      <button class="action danger small" onclick="this.closest('.row').remove()">Verwijderen</button>
    </div>
    <div class="grid-3">
      <div>
        <label>Artikel</label>
        <input class="d-article" value="${data.article}">
      </div>
      <div>
        <label>Opmerking</label>
        <input class="d-remarks" value="${data.remarks}">
      </div>
      <div></div>
    </div>
    ${buildPhotoBlock('d')}
  `;
  wrap.appendChild(row);
  bindPhotoInput(row,'d',data);
}
function getDamageRows(){
  return [...document.querySelectorAll('#damageList .row')].map(r=>({
    article: r.querySelector('.d-article').value,
    remarks: r.querySelector('.d-remarks').value,
    photos: [...r.querySelectorAll('.d-preview img')].map(i=>i.src)
  }));
}
function validateDamage(data){
  if(!data.user) return alert('Gebruiker verplicht'), false;
  if(!data.location) return alert('Locatie verplicht'), false;
  if(!data.rows.length) return alert('Voeg minimaal 1 regel toe'), false;
  return true;
}
function getDamageForm(){
  return {
    email: document.getElementById('damageEmail').value,
    location: document.getElementById('damageLocation').value,
    user: document.getElementById('damageUser').value,
    rows: getDamageRows(),
    time: new Date().toLocaleString()
  };
}
function saveDamageHistory(){
  const d = getDamageForm();
  if(!validateDamage(d)) return;
  const h = getHistory(STORAGE_KEYS.damage);
  h.unshift(d); setHistory(STORAGE_KEYS.damage, h);
  renderDamageHistory();
}
function renderDamageHistory(){
  const el = document.getElementById('damageHistory');
  const h = getHistory(STORAGE_KEYS.damage);
  el.innerHTML = h.length? '' : '<div class="history-item">Geen data</div>';
  h.forEach(x=>{
    const div = document.createElement('div');
    div.className='history-item';
    div.textContent = `${x.location} - ${x.user} (${x.rows.length} regels)`;
    el.appendChild(div);
  });
}
function exportDamage(mode){
  const d = getDamageForm();
  if(!validateDamage(d)) return;
  if(mode==='pdf'){
    const { jsPDF } = window.jspdf; const doc = new jsPDF();
    let y=10; doc.text('Schade',10,y); y+=8;
    d.rows.forEach((r,i)=>{ doc.text(`${i+1}. ${r.article} - ${r.remarks}`,10,y); y+=6; });
    doc.save('schade.pdf');
  }
  if(mode==='excel'){
    const ws = XLSX.utils.json_to_sheet(d.rows);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Schade');
    XLSX.writeFile(wb, 'schade.xlsx');
  }
  if(mode==='mail'){
    location.href = `mailto:${d.email}?subject=Schade&body=${encodeURIComponent(JSON.stringify(d))}`;
  }
  if(mode==='wa'){
    location.href = `https://wa.me/?text=${encodeURIComponent(JSON.stringify(d))}`;
  }
}

// ====== MANCO (SCHADE STIJL + EXTRA VELDEN) ======
function createMancoRowData(){
  return { article:'', barcode:'', counted:'', status:'', photos:[] };
}
function addMancoRow(prefill){
  const data = prefill || createMancoRowData();
  const wrap = document.getElementById('mancoList');
  const row = document.createElement('div');
  row.className='row';
  row.innerHTML = `
    <div class="row-head">
      <strong>Manco regel</strong>
      <button class="action danger small" onclick="this.closest('.row').remove()">Verwijderen</button>
    </div>

    <div class="grid-3">
      <div>
        <label>Artikel</label>
        <input class="m-article" value="${data.article}">
      </div>
      <div>
        <label>Barcode info</label>
        <input class="m-barcode" value="${data.barcode}">
      </div>
      <div>
        <label>Werkelijk geteld</label>
        <input type="number" min="0" class="m-counted" value="${data.counted}">
      </div>
    </div>

    <div style="margin-top:8px">
      <label>Status</label>
      <div>
        <span class="badge valid" onclick="setStatus(this,'valid')">Valide</span>
        <span class="badge invalid" onclick="setStatus(this,'invalid')">Niet valide</span>
        <span class="badge na" onclick="setStatus(this,'na')">NVT</span>
      </div>
    </div>

    ${buildPhotoBlock('m')}
  `;
  wrap.appendChild(row);
  bindPhotoInput(row,'m',data);
}
function setStatus(el, val){
  const row = el.closest('.row');
  row.querySelectorAll('.badge').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  row.dataset.status = val;
}
function getMancoRows(){
  return [...document.querySelectorAll('#mancoList .row')].map(r=>({
    article: r.querySelector('.m-article').value,
    barcode: r.querySelector('.m-barcode').value,
    counted: r.querySelector('.m-counted').value,
    status: r.dataset.status || '',
    photos: [...r.querySelectorAll('.m-preview img')].map(i=>i.src)
  }));
}
function validateManco(d){
  if(!d.user) return alert('Gebruiker verplicht'), false;
  if(!d.location) return alert('Locatie verplicht'), false;
  if(!d.rows.length) return alert('Voeg minimaal 1 regel toe'), false;
  if(d.rows.some(r=>!r.status)) return alert('Status verplicht per regel'), false;
  return true;
}
function getMancoForm(){
  return {
    email: document.getElementById('mancoEmail').value,
    location: document.getElementById('mancoLocation').value,
    user: document.getElementById('mancoUser').value,
    rows: getMancoRows(),
    time: new Date().toLocaleString()
  };
}
function saveMancoHistory(){
  const d = getMancoForm();
  if(!validateManco(d)) return;
  const h = getHistory(STORAGE_KEYS.manco);
  h.unshift(d); setHistory(STORAGE_KEYS.manco, h);
  renderMancoHistory();
}
function renderMancoHistory(){
  const el = document.getElementById('mancoHistory');
  const h = getHistory(STORAGE_KEYS.manco);
  el.innerHTML = h.length? '' : '<div class="history-item">Geen data</div>';
  h.forEach(x=>{
    const div = document.createElement('div');
    div.className='history-item';
    div.textContent = `${x.location} - ${x.user} (${x.rows.length} regels)`;
    el.appendChild(div);
  });
}
function exportManco(mode){
  const d = getMancoForm();
  if(!validateManco(d)) return;
  if(mode==='pdf'){
    const { jsPDF } = window.jspdf; const doc = new jsPDF();
    let y=10; doc.text('Manco',10,y); y+=8;
    d.rows.forEach((r,i)=>{
      doc.text(`${i+1}. ${r.article} | BC:${r.barcode} | Geteld:${r.counted} | ${r.status}`,10,y);
      y+=6;
    });
    doc.save('manco.pdf');
  }
  if(mode==='excel'){
    const ws = XLSX.utils.json_to_sheet(d.rows);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Manco');
    XLSX.writeFile(wb, 'manco.xlsx');
  }
  if(mode==='mail'){
    location.href = `mailto:${d.email}?subject=Manco&body=${encodeURIComponent(JSON.stringify(d))}`;
  }
  if(mode==='wa'){
    location.href = `https://wa.me/?text=${encodeURIComponent(JSON.stringify(d))}`;
  }
}

// ====== HISTORY CLEAR ======
function clearHistory(type){
  if(!confirm('Weet je het zeker?')) return;
  localStorage.removeItem(STORAGE_KEYS[type]);
  if(type==='damage') renderDamageHistory();
  if(type==='manco') renderMancoHistory();
  updateDashboard();
}

// ====== DASHBOARD ======
function updateDashboard(){
  const d = getHistory(STORAGE_KEYS.damage);
  const m = getHistory(STORAGE_KEYS.manco);
  document.getElementById('dashDamage').textContent = d.length;
  document.getElementById('dashManco').textContent = m.length;
  document.getElementById('dashTotal').textContent = d.length + m.length;
}

// ====== INIT ======
renderDamageHistory();
renderMancoHistory();
updateDashboard();

</script>

</body>
</html>
